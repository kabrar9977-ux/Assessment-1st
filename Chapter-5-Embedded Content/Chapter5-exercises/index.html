<!DOCTYPE html>
<head>
    <title>Embedded Video</title>

    <style>
        body {
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background-color: #b75050;
        }

        video {
            max-width: 80%;
            border: 3px solid black;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <video controls loop poster="Ekaki.png">
        <source src="Rum Rum Rum.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

</body>
</html>
