<!DOCTYPE html>
<head>
    <title>Petrol Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Petrol Calculator</h1>

        <!-- this Input for price per liter -->
        <label>Price per Liter (£):</label>
        <input type="number" id="pricePerLiter" value="1.72">

        <!-- this Input for liters -->
        <label>Liters Purchased:</label>
        <input type="number" id="liters" value="0">

        <!-- this is the Calculate button -->
        <button onclick="calculateTotal()">Calculate Total</button>

        <!-- this is where the result will be displayed -->
        <p id="result">Total: £0.00</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
